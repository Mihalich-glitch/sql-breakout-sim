version: '3.8'

services:
  # Наше приложение
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASSWORD=admin
      - DB_NAME=security_demo
      - DB_PORT=5432
    depends_on:
      - db

  # База данных
  db:
    image: postgres:15-alpine
    container_name: vuln_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: security_demo
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # Авто-инициализация базы