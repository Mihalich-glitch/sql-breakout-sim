version: '3.8' # Версия формата файла

services:
  # Название нашего первого "музыканта" — базы данных
  db:
    image: postgres:15-alpine # Берем готовый официальный образ (легкую версию)
    restart: always           # Если упадет — поднять автоматически
    environment:              # Настройки (логин/пароль)
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: security_demo
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"           # Пробрасываем порт из контейнера в WSL/Windows
    volumes:
      - db_data:/var/lib/postgresql/data # Чтобы данные не удалились при выключении

# Место на диске, где Docker будет хранить данные базы
volumes:
  db_data: