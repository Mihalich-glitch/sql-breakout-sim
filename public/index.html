<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Injection Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-controls">
        <button id="themeToggle">🌙 Темная тема</button>
        <label class="safe-mode-label">
            <input type="checkbox" id="safeMode"> Включить защиту (Prepared Statements)
        </label>
    </div>

    <h1>🛡️ Vulnerability Lab: SQL Injection</h1>
    
    <div class="attack-presets">
        <span class="presets-title">Быстрые атаки:</span>
        <button class="preset-btn" onclick="applyPreset('1 OR 1=1', 'bypass')">Обход (OR)</button>
        <button class="preset-btn" onclick="applyPreset('1 UNION SELECT 1, current_user, \'pass\', version()', 'info')">Версия БД</button>
        <button class="preset-btn" onclick="applyPreset('1 UNION SELECT 1, table_name, \'a\', \'b\' FROM information_schema.tables WHERE table_schema = \'public\'', 'tables')">Список таблиц</button>
    </div>

    <div id="hintDisplay" class="hint-card" style="display: none;">
        <strong>💡 Анализ атаки:</strong>
        <p id="hintContent"></p>
    </div>

    <div class="search-section">
        <input type="text" id="userId" placeholder="Введите ID пользователя или выберите атаку">
        <button id="searchBtn" onclick="searchUser()">Запустить SQL</button>
    </div>

    <div class="console-section">
        <h4>Отправленный SQL-запрос:</h4>
        <div id="queryLog" class="log">Ожидание действий...</div>

        <h4>Ответ от базы данных (JSON):</h4>
        <div id="resultBox" class="result">Результаты появятся здесь...</div>
    </div>

    <script>
        const attackHints = {
            'bypass': 'Механика: Добавление "OR 1=1" делает условие WHERE всегда истинным. БД игнорирует конкретный ID и возвращает все записи.',
            'info': 'Механика: Оператор UNION склеивает основной запрос с системными функциями для извлечения метаданных (версия СУБД, пользователь).',
            'tables': 'Механика: Запрос к "information_schema.tables" позволяет злоумышленнику узнать структуру всей базы данных.'
        };

        // Темы
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const isDark = document.body.hasAttribute('data-theme');
            if (isDark) {
                document.body.removeAttribute('data-theme');
                themeToggle.innerText = '🌙 Темная тема';
            } else {
                document.body.setAttribute('data-theme', 'dark');
                themeToggle.innerText = '☀️ Светлая тема';
            }
        });

        // Пресеты
        function applyPreset(queryValue, attackType) {
            document.getElementById('userId').value = queryValue;
            const display = document.getElementById('hintDisplay');
            const content = document.getElementById('hintContent');
            content.innerText = attackHints[attackType];
            display.style.display = 'block';
        }

        // Основная функция поиска
        async function searchUser() {
            const id = document.getElementById('userId').value;
            const isSafe = document.getElementById('safeMode').checked;
            const url = `/user/${encodeURIComponent(id)}?safe=${isSafe}`;
            
            try {
                const res = await fetch(url);
                const json = await res.json();

                const logElement = document.getElementById('queryLog');
                logElement.innerText = json.executedQuery || "Ошибка запроса";
                
                // Визуальная индикация защиты
                logElement.style.color = json.protected ? "var(--accent-color)" : "#ff4444";
                logElement.style.borderColor = json.protected ? "var(--accent-color)" : "#ff4444";

                document.getElementById('resultBox').innerText = JSON.stringify(json.data || json.error, null, 2);
            } catch (e) {
                document.getElementById('resultBox').innerText = "Ошибка соединения с сервером";
            }
        }
    </script>
</body>
</html>
